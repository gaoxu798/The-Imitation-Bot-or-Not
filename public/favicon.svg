  <line x1="11" y1="16" x2="21" y2="16" stroke="#ff00ff" stroke-width="0.7" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="2.5" fill="#00f0ff"/>
  <circle cx="16" cy="16" r="1.2" fill="#ffffff"/>
